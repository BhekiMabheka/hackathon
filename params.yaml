# DVC parameter file — all tunable values that DVC tracks for pipeline invalidation.
# Edit here; DVC will detect changes and re-run affected stages.

data:
  raw_path: data/raw
  processed_path: data/processed
  interim_path: data/interim
  test_size: 0.2
  val_size: 0.1
  random_state: 42
  date_col: transaction_date        # update once brief is released
  target_col: target                # update once brief is released
  id_col: customer_id               # update once brief is released

features:
  lag_windows: [7, 14, 30, 90]      # rolling window sizes (days)
  rolling_agg_fns: ["mean", "std", "min", "max", "sum"]
  cat_encoding: "target"            # options: target, ordinal, onehot
  drop_high_null_thresh: 0.8        # drop features with > 80% nulls

training:
  cv_strategy: "stratified_time"    # stratified_time | stratified_kfold | time_series
  n_folds: 5
  metric: "roc_auc"                 # primary metric for leaderboard
  secondary_metrics: ["pr_auc", "f1", "gini"]
  debug: false                      # if true: subsample data for fast iteration
  debug_nrows: 5000

model:
  type: "lgbm"                      # lgbm | xgb | ensemble
  lgbm:
    n_estimators: 2000
    learning_rate: 0.03
    num_leaves: 127
    min_child_samples: 50
    subsample: 0.8
    colsample_bytree: 0.8
    reg_alpha: 0.1
    reg_lambda: 1.0
    class_weight: "balanced"
    early_stopping_rounds: 100
    verbose: -1
  xgb:
    n_estimators: 2000
    learning_rate: 0.03
    max_depth: 6
    min_child_weight: 5
    subsample: 0.8
    colsample_bytree: 0.8
    reg_alpha: 0.1
    reg_lambda: 1.0
    scale_pos_weight: 1             # set to neg/pos ratio for imbalance
    early_stopping_rounds: 100

optuna:
  n_trials: 50
  timeout: 3600
  direction: "maximize"

submission:
  output_dir: outputs/submissions
  id_col: customer_id
  pred_col: score
