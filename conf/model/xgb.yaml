# @package _global_.model
type: xgb

xgb:
  n_estimators: 2000
  learning_rate: 0.03
  max_depth: 6
  min_child_weight: 5
  gamma: 0.0
  subsample: 0.8
  colsample_bytree: 0.8
  reg_alpha: 0.1
  reg_lambda: 1.0
  scale_pos_weight: 1       # set to neg_count/pos_count for severe imbalance
  use_label_encoder: false
  eval_metric: auc
  n_jobs: -1
  random_state: 42
  early_stopping_rounds: 100
  tree_method: hist         # hist is faster than exact for large datasets
