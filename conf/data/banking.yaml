# @package _global_.data
# Confirmed from loan_dataset_20000.csv (20,000 rows, 22 columns)

raw_path: data/raw
processed_path: data/processed
interim_path: data/interim
train_file: loan_dataset_20000.csv

# Column roles
id_col: loan_id           # synthetic — generated from row index during ingestion
date_col: null            # no date column in this dataset (cross-sectional)
target_col: loan_paid_back

# Categorical columns (for encoding)
categorical_cols:
  - gender
  - marital_status
  - education_level
  - employment_status
  - loan_purpose
  - grade_subgrade         # parsed into grade_letter + grade_number in preprocessing

# Numeric columns
numeric_cols:
  - age
  - annual_income
  - monthly_income
  - debt_to_income_ratio
  - credit_score
  - loan_amount
  - interest_rate
  - loan_term
  - installment            # LEAKAGE RISK: derived from loan_amount/rate/term — see preprocessing
  - num_of_open_accounts
  - total_credit_limit
  - current_balance
  - delinquency_history
  - public_records
  - num_of_delinquencies

# Potentially leaky features to flag (derived/target-proxies)
leakage_candidates:
  - installment            # = f(loan_amount, interest_rate, loan_term) — consider dropping
  - monthly_income         # = annual_income / 12 — redundant

# Data shape
expected_train_rows: 16000   # 80% of 20000
expected_test_rows: 4000     # 20% of 20000
expected_n_features: 22

# Split config — stratified (no date column)
test_size: 0.20
val_size: 0.10
random_state: 42
stratify: true

# Quality thresholds
max_null_ratio: 0.80
max_cardinality: 500
min_class_samples: 100
