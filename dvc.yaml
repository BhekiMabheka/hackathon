stages:

  # ── Stage 1: Raw data validation ─────────────────────────────────────────
  # Cross-sectional dataset: no date leakage check, single file.
  validate_raw:
    cmd: python -m src.data.validation --stage raw
    deps:
      - src/data/validation.py
      - data/raw
    params:
      - params.yaml:
          - data.raw_path
          - data.target_col
          - data.id_col
    outs:
      - outputs/reports/raw_validation_report.json

  # ── Stage 2: Preprocessing ───────────────────────────────────────────────
  # Splits full file into train/val/holdout, then fits preprocessor on train.
  preprocess:
    cmd: python -m src.data.preprocessing
    deps:
      - src/data/preprocessing.py
      - src/data/splits.py
      - src/data/ingestion.py
      - data/raw
      - outputs/reports/raw_validation_report.json
    params:
      - params.yaml:
          - data
          - features.drop_high_null_thresh
          - features.drop_redundant
          - features.drop_leaky
    outs:
      - data/interim/train.parquet
      - data/interim/val.parquet
      - data/interim/holdout.parquet
      - data/interim/preprocessing_meta.json

  # ── Stage 3: Feature engineering ─────────────────────────────────────────
  feature_engineering:
    cmd: python -m src.features.engineering
    deps:
      - src/features/engineering.py
      - src/features/selection.py
      - data/interim/train.parquet
      - data/interim/holdout.parquet
      - data/interim/preprocessing_meta.json
    params:
      - params.yaml:
          - features
          - data.id_col
          - data.target_col
    outs:
      - data/processed/train_features.parquet
      - data/processed/test_features.parquet
      - data/processed/feature_meta.json

  # ── Stage 4: Model training ───────────────────────────────────────────────
  train:
    cmd: python scripts/train.py
    deps:
      - src/models
      - src/evaluation
      - src/pipelines/training_pipeline.py
      - data/processed/train_features.parquet
    params:
      - params.yaml:
          - training
          - model
    outs:
      - outputs/models/model.pkl
      - outputs/models/oof_predictions.parquet
    metrics:
      - outputs/reports/cv_metrics.json:
          cache: false

  # ── Stage 5: Inference / submission ───────────────────────────────────────
  # Runs on holdout (or competition test file when released).
  predict:
    cmd: python scripts/predict.py
    deps:
      - src/pipelines/inference_pipeline.py
      - outputs/models/model.pkl
      - data/processed/test_features.parquet
    params:
      - params.yaml:
          - submission
    outs:
      - outputs/submissions/submission.csv:
          cache: false
